  // Ripple on buttons
  if(this.tagName==="BUTTON"||this.classList.contains("ch")||this.classList.contains("rdd-head")){rip(this,e);}
  const a=this.dataset.a;

  // --- FULL RE-RENDERS (tab switch, filter, panic) ---
  if(a==="nv"){const t=this.dataset.t;if(t!==tab){tab=t;R();scrollTo({top:0,behavior:"smooth"});}}
  else if(a==="fl"){sf=this.dataset.v;R();}
  else if(a==="panic"){po=!po;R();}

  // --- DOM-ONLY TOGGLES (no re-render, no flash) ---
  else if(a==="ck"){
    const id=this.dataset.id;
    const row=this.closest('.cr');
    ck[id]=!ck[id];sc();
    const box=row.querySelector('.ck');
    const lbl=row.querySelector('.cl');
    if(ck[id]){
      box.classList.add('dn');
      box.innerHTML='<svg class="chk-anim" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12 13 4" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>';
      lbl.classList.add('dn');
      row.classList.add('ck-flash');
      setTimeout(()=>row.classList.remove('ck-flash'),500);
    } else {
      box.classList.remove('dn');box.innerHTML='';
      lbl.classList.remove('dn');
    }
    // Update progress bar + counts
    const tot=CL.length,dn=CL.filter(c=>ck[c.id]).length,pct=Math.round(dn/tot*100);
    const pf=document.querySelector('.pf');if(pf)pf.style.width=pct+'%';
    const pp=document.querySelector('.pp');if(pp){pp.textContent=pct+'%';pp.style.color=pct===100?'var(--green)':'var(--amber)';}
    document.querySelectorAll('.tbh').forEach(th=>{
      const bl=th.querySelector('.lb').textContent;
      const bk=bl==='MORNING OPS'?'morning':bl==='MIDDAY'?'midday':bl==='EVENING'?'evening':'bedtime';
      const its=CL.filter(c=>c.bk===bk),bd=its.filter(c=>ck[c.id]).length;
      const ct=th.querySelector('.ct');if(ct)ct.textContent=bd+'/'+its.length;
    });
  }
  else if(a==="tc"){
    const nm=this.dataset.nm;ec.has(nm)?ec.delete(nm):ec.add(nm);
    const card=this.closest('.cd');
    const body=card.querySelector('.cx');
    const chev=this.querySelector('.cv');
    if(ec.has(nm)){body.style.maxHeight='400px';body.style.opacity='1';chev.classList.add('op');}
    else{body.style.maxHeight='0';body.style.opacity='0';chev.classList.remove('op');}
  }
  else if(a==="tp"){
    const id=this.dataset.id;ep.has(id)?ep.delete(id):ep.add(id);
    const body=this.nextElementSibling;
    const chev=this.querySelector('.cv');
    if(ep.has(id)){body.style.maxHeight='600px';body.style.opacity='1';chev.classList.add('op');}
    else{body.style.maxHeight='0';body.style.opacity='0';chev.classList.remove('op');}
  }
  else if(a==="ts"){
    const id=this.dataset.id;es.has(id)?es.delete(id):es.add(id);
    const body=this.nextElementSibling;
    const chev=this.querySelector('.cv');
    if(es.has(id)){body.style.maxHeight='600px';body.style.opacity='1';chev.classList.add('op');}
    else{body.style.maxHeight='0';body.style.opacity='0';chev.classList.remove('op');}
  }
  else if(a==="rd"){
    const v=this.dataset.v;repDrop[v]=!repDrop[v];
    const card=this.closest('.rdd');
    const body=card.querySelector('.rdd-body');
    const chev=this.querySelector('.cv');
    const items=body.children.length;
    if(repDrop[v]){body.style.maxHeight=(items*40)+'px';body.style.opacity='1';chev.classList.add('op');}
    else{body.style.maxHeight='0';body.style.opacity='0';chev.classList.remove('op');}
  }
};});}
